# OrganoChron Configuration
# =========================

# Data parameters
gtex:
  min_samples_per_tissue: 100
  min_tpm_threshold: 1.0
  min_sample_fraction: 0.20
  age_midpoints:
    "20-29": 25
    "30-39": 35
    "40-49": 45
    "50-59": 55
    "60-69": 65
    "70-79": 75
  tissues:
    - "Adipose - Subcutaneous"
    - "Adipose - Visceral (Omentum)"
    - "Adrenal Gland"
    - "Artery - Aorta"
    - "Artery - Coronary"
    - "Artery - Tibial"
    - "Brain - Cortex"
    - "Brain - Cerebellum"
    - "Colon - Sigmoid"
    - "Colon - Transverse"
    - "Esophagus - Mucosa"
    - "Heart - Atrial Appendage"
    - "Heart - Left Ventricle"
    - "Kidney - Cortex"
    - "Liver"
    - "Lung"
    - "Muscle - Skeletal"
    - "Nerve - Tibial"
    - "Pancreas"
    - "Pituitary"
    - "Skin - Not Sun Exposed (Suprapubic)"
    - "Skin - Sun Exposed (Lower leg)"
    - "Small Intestine - Terminal Ileum"
    - "Spleen"
    - "Stomach"
    - "Thyroid"
    - "Whole Blood"

# Aging signature parameters
aging:
  spearman_rho_threshold: 0.15
  spearman_fdr_threshold: 0.05
  regression_fdr_threshold: 0.01

# WGCNA parameters
wgcna:
  top_genes_mad: 5000
  scale_free_r2: 0.70
  min_module_size: 30
  merge_cut_height: 0.15
  module_age_correlation_pvalue: 0.05

# Secretome parameters
secretome:
  min_tpm_source_tissue: 1.0
  min_tpm_target_tissue: 5.0
  string_score_threshold: 700
  edge_weight_threshold: 0.01

# Causal discovery parameters
causal:
  pc_alpha: 0.05
  min_shared_individuals: 50
  min_tissues_per_individual: 10
  lingam_prune_threshold: 0.05

# Hub analysis parameters
hub:
  weights:
    out_degree: 0.3
    pagerank: 0.3
    betweenness: 0.2
    cascade_depth: 0.2
  cascade_damping: 0.7
  cascade_iterations: 10
  bootstrap_n: 1000

# Drug repurposing parameters
drug:
  lincs_cell_lines: ["A549", "MCF7", "PC3", "VCAP", "HA1E", "HT29"]
  lincs_time: "24h"
  reversal_fdr_threshold: 0.05
  top_candidates: 20
  cascade_damping: 0.7

# Validation parameters
validation:
  cv_folds: 5
  permutation_n: 1000
  permutation_pvalue: 0.001

# Figure parameters
figures:
  dpi: 300
  font: "Arial"
  font_size_label: 8
  font_size_axis: 10
  font_size_title: 12
  single_column_mm: 89
  double_column_mm: 183
  palette: "colorblind"

# Pipeline parameters
pipeline:
  random_seed: 42
  n_jobs: -1  # -1 = all cores
  use_synthetic_fallback: true  # Use synthetic data if downloads fail
  checkpoint_dir: "results/checkpoints"
